services:

  wordpress:
    build:
      context: .
      dockerfile: php.Dockerfile
    container_name: abcnews_wordpress
    volumes:
      - wp_core:/var/www/html
      - ./themedata:/var/www/html/wp-content/themes/abc-news:ro
      - ./uploads:/var/www/html/wp-content/uploads:rw
      - ./wp-config.php:/var/www/html/wp-config.php:ro
      - ./bin/bootstrap-wp-core.sh:/usr/local/bin/bootstrap-wp-core.sh:ro
      - ./healthcheck.sh:/usr/local/bin/wp-healthcheck:ro
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_PORT: "3306"
      WORDPRESS_DB_NAME: ${DB_NAME:-abcnews}
      WORDPRESS_DB_USER: ${DB_USER:-abcnews}
      WORDPRESS_DB_PASSWORD: ${DB_PASS:-abcnewspass}
      WORDPRESS_TABLE_PREFIX: ${DB_PREFIX:-wp_}
      WP_DEBUG: "true"
      WP_DEBUG_LOG: "true"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/wp-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - abcnews_net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: abcnews_nginx
    ports:
      - "8085:80"
    volumes:
      - wp_core:/var/www/html:ro
      - ./themedata:/var/www/html/wp-content/themes/abc-news:ro
      - ./uploads:/var/www/html/wp-content/uploads:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      wordpress:
        condition: service_healthy
    networks:
      - abcnews_net
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    container_name: abcnews_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-abcnews}
      MYSQL_USER: ${DB_USER:-abcnews}
      MYSQL_PASSWORD: ${DB_PASS:-abcnewspass}
    volumes:
      - abcnews_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - abcnews_net
    restart: unless-stopped

volumes:
  wp_core:
  abcnews_db_data:

networks:
  abcnews_net:
    driver: bridge
